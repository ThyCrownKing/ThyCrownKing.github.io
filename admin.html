<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crown Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  <aside class="sidebar">
    <h2>👑 Admin</h2>
    <button class="nav-btn active" data-page="dashboard" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" data-page="automod" onclick="showPage('automod')">Automod</button>
    <button class="nav-btn" data-page="lockdown" onclick="showPage('lockdown')">Lockdown</button>
    <button class="nav-btn" data-page="voice" onclick="showPage('voice')">Voice Status</button>
    <button class="nav-btn" data-page="moderation" onclick="showPage('moderation')">Moderation</button>
    <button class="nav-btn secondary" onclick="window.location.href='/'">← Back Home</button>
  </aside>

  <main class="admin-main">

    <section id="dashboard" class="page active">
      <h1>Dashboard</h1>

      <div class="card">
        <h2>Connection</h2>
        <p>Enter your bot API endpoint and your JWT token to connect this dashboard to your bot backend.</p>
        <label>API Base URL</label>
        <input id="apiBase" type="text" placeholder="https://example.com">
        <label>JWT Token</label>
        <input id="tokenInput" type="password" placeholder="Paste token here">
        <label>API Key (optional)</label>
        <input id="apiKey" type="password" placeholder="Optional API key">
        <button id="saveSettings">Save and Load</button>
        <div id="connectionStatus" class="status"></div>
      </div>

      <div class="card">
        <h2>Guilds</h2>
        <div class="form-row">
          <select id="guildSelect"></select>
          <button id="refreshGuilds">Refresh</button>
        </div>
        <div id="guildInfo" class="status"></div>
      </div>
    </section>

    <section id="automod" class="page">
      <h1>Automod Settings</h1>
      <div class="card" id="automodForm"></div>
    </section>

    <section id="lockdown" class="page">
      <h1>Lockdown Controls</h1>
      <div class="card">
        <label>Lockdown reason</label>
        <input id="lockReason" placeholder="Reason">
        <div class="form-row">
          <button class="danger" id="lockBtn">Lock Server</button>
          <button id="unlockBtn">Unlock Server</button>
        </div>
        <div id="lockResult" class="status"></div>
      </div>
    </section>

    <section id="voice" class="page">
      <h1>Voice Status</h1>
      <div class="card">
        <button id="voiceRefresh">Refresh</button>
        <div id="voiceStatus" class="status"></div>
      </div>
    </section>

    <section id="moderation" class="page">
      <h1>Moderation Tools</h1>

      <div class="card">
        <h2>Warn User</h2>
        <label>User ID</label>
        <input id="warnUserId" placeholder="User ID">
        <label>Reason</label>
        <input id="warnReason" placeholder="Reason">
        <button id="warnBtn">Warn User</button>
        <div id="warnResult" class="status"></div>
      </div>

      <div class="card">
        <h2>Blacklist User</h2>
        <label>User ID</label>
        <input id="blacklistUserId" placeholder="User ID">
        <label>Reason</label>
        <input id="blacklistReason" placeholder="Reason">
        <button id="blacklistBtn">Blacklist User</button>
        <div id="blacklistResult" class="status"></div>
      </div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>
