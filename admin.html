<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crown Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">

  <aside class="sidebar">
    <h2>👑 Admin</h2>
    <button class="nav-btn" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-btn" onclick="showPage('automod')">Automod</button>
    <button class="nav-btn" onclick="showPage('lockdown')">Lockdown</button>
    <button class="nav-btn" onclick="showPage('voice')">Voice Status</button>
    <button class="nav-btn" onclick="window.location.href='/'">← Back Home</button>
  </aside>

  <main class="admin-main">

    <!-- Connection -->
    <section id="dashboard" class="page active">
      <h1>Dashboard</h1>

      <div class="card">
        <h2>Connection</h2>
        <label>API Key:</label>
        <input id="apiKey" type="password" placeholder="API_SECRET">
        <button id="saveApiKey">Save</button>
        <p>JWT auto-loaded from <code>#token=...</code></p>
      </div>

      <div class="card">
        <h2>Guilds</h2>
        <select id="guildSelect"></select>
        <button id="refreshGuilds">Refresh</button>
        <div id="guildInfo"></div>
      </div>
    </section>

    <!-- Automod -->
    <section id="automod" class="page">
      <h1>Automod Settings</h1>
      <div class="card" id="automodForm"></div>
    </section>

    <!-- Lockdown -->
    <section id="lockdown" class="page">
      <h1>Lockdown Controls</h1>
      <div class="card">
        <input id="lockReason" placeholder="Reason">
        <button class="danger" id="lockBtn">Lock Server</button>
        <button id="unlockBtn">Unlock Server</button>
        <div id="lockResult"></div>
      </div>
    </section>

    <!-- Voice -->
    <section id="voice" class="page">
      <h1>Voice Status</h1>
      <button id="voiceRefresh">Refresh</button>
      <div id="voiceStatus" class="card"></div>
    </section>

  </main>

  <script src="admin.js"></script>
</body>
</html>

<!-- Moderation -->
<section id="moderation" class="page">
  <h1>Moderation Tools</h1>

  <div class="card">
    <h2>Warn User</h2>
    <input id="warnUserId" placeholder="User ID">
    <input id="warnReason" placeholder="Reason">
    <button id="warnBtn">Warn User</button>
    <div id="warnResult"></div>
  </div>

  <div class="card">
    <h2>Blacklist User</h2>
    <input id="blacklistUserId" placeholder="User ID">
    <input id="blacklistReason" placeholder="Reason">
    <button id="blacklistBtn">Blacklist User</button>
    <div id="blacklistResult"></div>
  </div>
</section>
