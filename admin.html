<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crown Admin Panel</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e5e7eb; margin: 0; }
    header { padding: 1rem 2rem; background: #020617; display: flex; justify-content: space-between; align-items: center; }
    main { padding: 1.5rem 2rem; }
    .card { background: #1f2937; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; }
    select, input, button { padding: 0.4rem 0.6rem; border-radius: 0.25rem; border: none; margin-right: 0.5rem; }
    button { background: #3b82f6; color: white; cursor: pointer; }
    button.danger { background: #ef4444; }
    h2 { margin-top: 0; }
  </style>
</head>
<body>
  <header>
    <div>👑 Crown Admin Panel</div>
    <div id="status">Loading...</div>
  </header>
  <main>
    <div class="card">
      <h2>Connection</h2>
      <div>
        <label>API Key:</label>
        <input id="apiKey" type="password" placeholder="API_SECRET">
        <button id="saveApiKey">Save</button>
      </div>
      <p>JWT token is auto-read from URL fragment: <code>#token=...</code></p>
    </div>

    <div class="card">
      <h2>Guilds</h2>
      <select id="guildSelect"></select>
      <button id="refreshGuilds">Refresh</button>
      <div id="guildInfo"></div>
    </div>

    <div class="card">
      <h2>Automod</h2>
      <div id="automodForm"></div>
    </div>

    <div class="card">
      <h2>Lockdown</h2>
      <input id="lockReason" placeholder="Reason">
      <button class="danger" id="lockBtn">Lock Server</button>
      <button id="unlockBtn">Unlock Server</button>
      <div id="lockResult"></div>
    </div>

    <div class="card">
      <h2>Voice Status</h2>
      <button id="voiceRefresh">Refresh</button>
      <div id="voiceStatus"></div>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
